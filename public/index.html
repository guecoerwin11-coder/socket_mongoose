<!DOCTYPE html>
<html>
<head>
  <title>Level 3 - Persistent Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f0f2f5; height: 100vh; }
    #loginScreen { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-card { background: white; padding: 40px; border-radius: 12px; width: 320px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
    .login-card h2 { margin-bottom: 20px; color: #333; }
    .login-card input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
    .login-card button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-bottom: 8px; }
    .login-card .register-btn { background: #2196F3; }
    .error { color: red; margin-top: 8px; font-size: 14px; }
    #chatScreen { display: none; height: 100vh; }
    .app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
    .sidebar { background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 18px; color: #333; }
    .my-name { padding: 10px 20px; background: #f8f8f8; font-size: 13px; color: #666; border-bottom: 1px solid #eee; }
    .users-list { flex: 1; overflow-y: auto; }
    .user-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f5f5f5; transition: background 0.2s; position: relative; }
    .user-item:hover { background: #f5f5f5; }
    .user-item.active { background: #e8f5e9; }
    .online-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-online { background: #4CAF50; }
    .dot-offline { background: #ccc; }
    .user-name { font-weight: 500; color: #333; }
    .user-status { font-size: 11px; color: #999; }
    .unread-badge { position: absolute; right: 15px; background: #e94560; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
    .chat-area { display: flex; flex-direction: column; background: #f0f2f5; }
    .chat-header { background: white; padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
    .chat-header h3 { color: #333; }
    .chat-header .status { font-size: 12px; color: #999; }
    .no-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-size: 18px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
    .message { max-width: 60%; padding: 10px 14px; border-radius: 12px; font-size: 14px; }
    .message.received { background: white; align-self: flex-start; border-bottom-left-radius: 2px; }
    .message.sent { background: #4CAF50; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
    .message .msg-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; opacity: 0.7; }
    .message .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }
    .typing-indicator { padding: 5px 20px; font-size: 12px; color: #999; font-style: italic; min-height: 24px; }
    .input-area { background: white; padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #eee; }
    .input-area input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
    .input-area button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .date-divider { text-align: center; color: #999; font-size: 12px; margin: 10px 0; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-card">
      <h2>💬 Chat App</h2>
      <input id="nameInput" placeholder="Name" />
      <input id="emailInput" placeholder="Email" />
      <input id="passwordInput" type="password" placeholder="Password" />
      <button onclick="register()">Register</button>
      <button class="register-btn" onclick="login()">Login</button>
      <p class="error" id="loginError"></p>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chatScreen">
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">💬 Messages</div>
        <div class="my-name" id="myName">...</div>
        <div class="users-list" id="usersList"></div>
      </div>
      <div class="chat-area" id="chatArea">
        <div class="no-chat" id="noChat">👈 Select someone to chat</div>
        <div id="activeChatArea" style="display:none; flex-direction:column; flex:1;">
          <div class="chat-header">
            <div class="online-dot dot-offline" id="recipientDot"></div>
            <div>
              <h3 id="recipientName">-</h3>
              <div class="status" id="recipientStatus">offline</div>
            </div>
          </div>
          <div class="messages" id="messages"></div>
          <div class="typing-indicator" id="typingIndicator"></div>
          <div class="input-area">
            <input id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)" />
            <button onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null
    let token = null
    let currentUser = null
    let currentRecipient = null
    let currentConversationId = null
    let typingTimeout = null
    let unreadCounts = {}

    // ─────────────────────────────────
    // AUTH
    // ─────────────────────────────────
    async function register() {
      const name = document.getElementById('nameInput').value.trim()
      const email = document.getElementById('emailInput').value.trim()
      const password = document.getElementById('passwordInput').value

      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })
      const data = await res.json()

      if (res.ok) {
        token = data.token
        currentUser = data.user
        initChat()
      } else {
        document.getElementById('loginError').textContent = data.message
      }
    }

    async function login() {
      const email = document.getElementById('emailInput').value.trim()
      const password = document.getElementById('passwordInput').value

      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      const data = await res.json()

      if (res.ok) {
        token = data.token
        currentUser = data.user
        initChat()
      } else {
        document.getElementById('loginError').textContent = data.message
      }
    }

    // ─────────────────────────────────
    // INITIALIZE CHAT
    // ─────────────────────────────────
    async function initChat() {
      document.getElementById('loginScreen').style.display = 'none'
      document.getElementById('chatScreen').style.display = 'block'
      document.getElementById('myName').textContent = `Hi, ${currentUser.name}! 👋`

      await loadUnreadCounts()
      await loadUsers()
      connectSocket()
    }

    // ─────────────────────────────────
    // LOAD DATA
    // ─────────────────────────────────
    async function loadUsers() {
      const res = await fetch('/auth/users', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const users = await res.json()
      renderUsers(users)
    }

    async function loadUnreadCounts() {
      const res = await fetch('/auth/unread', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      unreadCounts = await res.json()
    }

    async function loadMessages(recipientId) {
      const res = await fetch(`/auth/messages/${recipientId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const data = await res.json()

      currentConversationId = data.conversationId

      const container = document.getElementById('messages')
      container.innerHTML = ''

      if (data.messages.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#999; margin-top:20px;">No messages yet. Say hi! 👋</p>'
        return
      }

      // group messages by date
      let lastDate = null
      data.messages.forEach(msg => {
        const msgDate = new Date(msg.createdAt).toLocaleDateString()

        if (msgDate !== lastDate) {
          const divider = document.createElement('div')
          divider.className = 'date-divider'
          divider.textContent = msgDate
          container.appendChild(divider)
          lastDate = msgDate
        }

        addMessage({
          text: msg.text,
          sender: { _id: msg.sender._id, name: msg.sender.name },
          createdAt: msg.createdAt
        })
      })

      scrollToBottom()
    }

    // ─────────────────────────────────
    // RENDER USERS
    // ─────────────────────────────────
    function renderUsers(users) {
      const container = document.getElementById('usersList')
      container.innerHTML = ''

      users.forEach(user => {
        const div = document.createElement('div')
        div.className = 'user-item'
        div.id = `user-item-${user._id}`

        const unread = unreadCounts[user._id] || 0

        div.innerHTML = `
          <div class="online-dot ${user.isOnline ? 'dot-online' : 'dot-offline'}"
               id="dot-${user._id}"></div>
          <div style="flex:1">
            <div class="user-name">${user.name}</div>
            <div class="user-status" id="status-${user._id}">
              ${user.isOnline ? 'Online' : 'Offline'}
            </div>
          </div>
          ${unread > 0 ? `<div class="unread-badge" id="badge-${user._id}">${unread}</div>` : `<div id="badge-${user._id}"></div>`}
        `

        div.onclick = () => startPrivateChat(user)
        container.appendChild(div)
      })
    }

    // ─────────────────────────────────
    // CONNECT SOCKET
    // ─────────────────────────────────
    function connectSocket() {
      socket = io({ auth: { token } })

      socket.on('connect', () => console.log('✅ Socket connected!'))

      socket.on('private message', (msg) => {
        if (currentRecipient) {
          const isCurrentChat =
            msg.sender._id === currentRecipient._id ||
            msg.sender._id === currentUser.id

          if (isCurrentChat) {
            addMessage(msg)
            scrollToBottom()

            // clear unread badge if message is from current recipient
            if (msg.sender._id === currentRecipient._id) {
              clearUnreadBadge(currentRecipient._id)
            }
          }
        } else {
          // not in this chat — show unread badge
          if (msg.sender._id !== currentUser.id) {
            incrementUnreadBadge(msg.sender._id)
          }
        }
      })

      socket.on('typing', ({ name }) => {
        if (currentRecipient) {
          document.getElementById('typingIndicator').textContent = `${name} is typing...`
        }
      })

      socket.on('stop typing', () => {
        document.getElementById('typingIndicator').textContent = ''
      })

      socket.on('user online', ({ id }) => updateUserStatus(id, true))
      socket.on('user offline', ({ id }) => updateUserStatus(id, false))

      socket.on('room joined', ({ conversationId }) => {
        currentConversationId = conversationId
        console.log(`🚪 Joined conversation: ${conversationId}`)
      })

      socket.on('error', ({ message }) => console.log('❌ Error:', message))
    }

    // ─────────────────────────────────
    // START PRIVATE CHAT
    // ─────────────────────────────────
    async function startPrivateChat(user) {
      currentRecipient = user

      document.getElementById('noChat').style.display = 'none'
      document.getElementById('activeChatArea').style.display = 'flex'
      document.getElementById('recipientName').textContent = user.name
      document.getElementById('recipientStatus').textContent =
        user.isOnline ? 'Online 🟢' : 'Offline ⚫'
      document.getElementById('recipientDot').className =
        `online-dot ${user.isOnline ? 'dot-online' : 'dot-offline'}`

      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'))
      document.getElementById(`user-item-${user._id}`)?.classList.add('active')

      // load message history from DB!
      await loadMessages(user._id)

      // clear unread badge
      clearUnreadBadge(user._id)

      // join socket room
      socket.emit('start private chat', { recipientId: user._id })

      document.getElementById('messageInput').focus()
    }

    // ─────────────────────────────────
    // SEND MESSAGE
    // ─────────────────────────────────
    function sendMessage() {
      const input = document.getElementById('messageInput')
      const text = input.value.trim()
      if (!text || !currentRecipient) return

      socket.emit('private message', {
        recipientId: currentRecipient._id,
        text
      })

      input.value = ''
      socket.emit('stop typing', { recipientId: currentRecipient._id })
      clearTimeout(typingTimeout)
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') { sendMessage(); return }

      if (currentRecipient) {
        socket.emit('typing', { recipientId: currentRecipient._id })
        clearTimeout(typingTimeout)
        typingTimeout = setTimeout(() => {
          socket.emit('stop typing', { recipientId: currentRecipient._id })
        }, 1000)
      }
    }

    // ─────────────────────────────────
    // UI HELPERS
    // ─────────────────────────────────
    function addMessage(msg) {
      const container = document.getElementById('messages')
      const isOwn = msg.sender._id === currentUser.id ||
                    msg.sender._id?.toString() === currentUser.id?.toString()

      const div = document.createElement('div')
      div.className = `message ${isOwn ? 'sent' : 'received'}`
      div.innerHTML = `
        ${!isOwn ? `<div class="msg-name">${msg.sender.name}</div>` : ''}
        <div>${msg.text}</div>
        <div class="msg-time">${new Date(msg.createdAt).toLocaleTimeString()}</div>
      `
      container.appendChild(div)
    }

    function updateUserStatus(userId, isOnline) {
      const dot = document.getElementById(`dot-${userId}`)
      const status = document.getElementById(`status-${userId}`)
      if (dot) dot.className = `online-dot ${isOnline ? 'dot-online' : 'dot-offline'}`
      if (status) status.textContent = isOnline ? 'Online' : 'Offline'

      if (currentRecipient && currentRecipient._id === userId) {
        document.getElementById('recipientStatus').textContent =
          isOnline ? 'Online 🟢' : 'Offline ⚫'
        document.getElementById('recipientDot').className =
          `online-dot ${isOnline ? 'dot-online' : 'dot-offline'}`
        currentRecipient.isOnline = isOnline
      }
    }

    function incrementUnreadBadge(userId) {
      unreadCounts[userId] = (unreadCounts[userId] || 0) + 1
      const badge = document.getElementById(`badge-${userId}`)
      if (badge) {
        badge.className = 'unread-badge'
        badge.textContent = unreadCounts[userId]
      }
    }

    function clearUnreadBadge(userId) {
      unreadCounts[userId] = 0
      const badge = document.getElementById(`badge-${userId}`)
      if (badge) {
        badge.className = ''
        badge.textContent = ''
      }
    }

    function scrollToBottom() {
      const container = document.getElementById('messages')
      container.scrollTop = container.scrollHeight
    }
  </script>
</body>
</html>
